name: Model Checks

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  model-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Train duration classifier (if data present)
        run: |
          python backend/tools/train_duration_classifier.py || true
      - name: Run audits
        run: |
          python backend/tools/audit_models.py || true
      - name: Check model metrics
        run: |
          python backend/tools/check_model_metrics.py
