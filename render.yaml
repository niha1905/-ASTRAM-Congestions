services:
  - type: web
    name: astram-frontend
    env: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://<backend-service>.onrender.com

  - type: web
    name: astram-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.wsgi:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: CORS_ORIGINS
        value: https://<frontend-service>.onrender.com
      - key: MAPPLS_REST_API_KEY
        value: ""
